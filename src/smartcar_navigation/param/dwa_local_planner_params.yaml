DWAPlannerROS:
  max_vel_x: 0.30
  min_vel_x: -0.10

  max_vel_y: 0.0
  min_vel_y: 0.0

  max_vel_trans: 0.28
  min_vel_trans: 0.08

  max_vel_theta: 1.20
  min_vel_theta: 0.35

  acc_lim_x: 1.2
  acc_lim_y: 0.0
  acc_lim_theta: 1.8

  xy_goal_tolerance: 0.05
  yaw_goal_tolerance: 0.10
  latch_xy_goal_tolerance: false

  sim_time: 1.2
  vx_samples: 18
  vy_samples: 0
  vth_samples: 24
  controller_frequency: 10.0

  path_distance_bias: 40.0
  goal_distance_bias: 18.0
  occdist_scale: 0.05
  forward_point_distance: 0.18
  stop_time_buffer: 0.2
  scaling_speed: 0.25
  max_scaling_factor: 0.2

  oscillation_reset_dist: 0.05

  publish_traj_pc: true
  publish_cost_grid_pc: true
